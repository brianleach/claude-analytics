[package]
name = "claude-analytics"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
clap = { version = "4", features = ["derive"] }
regex = "1"
glob = "0.3"
ureq = { version = "2", features = ["json"] }
dotenv = "0.15"

[profile.release]
opt-level = 3
